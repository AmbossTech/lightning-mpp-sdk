name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

      # Publish in dependency order: sdk first, then adapters
      - name: Publish @ambosstech/lightning-mpp-sdk
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/sdk/package.json
          provenance: true
          access: public
          strategy: upgrade

      - name: Publish @ambosstech/lightning-mpp-adapter-lnd
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/adapter-lnd/package.json
          provenance: true
          access: public
          strategy: upgrade

      - name: Publish @ambosstech/lightning-mpp-adapter-mock
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/adapter-mock/package.json
          provenance: true
          access: public
          strategy: upgrade

      - name: Publish @ambosstech/lightning-mpp-adapter-nwc
        uses: JS-DevTools/npm-publish@v4
        with:
          package: packages/adapter-nwc/package.json
          provenance: true
          access: public
          strategy: upgrade
